name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build clean deploy snapshot
        run: |
          rm -rf /tmp/hf-deploy
          mkdir -p /tmp/hf-deploy
          git archive HEAD | tar -x -C /tmp/hf-deploy

      - name: Debug snapshot contents
        run: |
          echo "--- Top level ---"
          ls -la /tmp/hf-deploy
          echo "--- docs/ ---"
          ls -la /tmp/hf-deploy/docs 2>&1 || echo "docs/ NOT FOUND IN SNAPSHOT"
          echo "--- data/ ---"
          ls -la /tmp/hf-deploy/data 2>&1 || echo "data/ NOT FOUND IN SNAPSHOT"

      - name: Push clean snapshot to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd /tmp/hf-deploy
          git init -q
          git checkout -q -b main
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -q -m "Deploy: sync from GitHub"
          git push --force https://gustavoscience:$HF_TOKEN@huggingface.co/spaces/gustavoscience/crestline-internal-assistant main
